<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Read a full privacy software review on SafeSpace.">
  <meta name="robots" content="index, follow">
  <title>Review — SafeSpace</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="bg-mesh" aria-hidden="true"></div>

<!-- Navigation -->
<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo" id="nav-logo">
      <div class="nav__logo-icon" aria-hidden="true">🔒</div>
      Safe<span class="accent">Space</span>
    </a>
    <div class="nav__links" role="list">
      <a href="index.html"    class="nav__link" id="nav-home"     role="listitem">Home</a>
      <a href="articles.html" class="nav__link" id="nav-articles" role="listitem">Articles</a>
      <a href="reviews.html"  class="nav__link" id="nav-reviews"  role="listitem">Reviews</a>
      <a href="about.html"    class="nav__link" id="nav-about"    role="listitem">About</a>
    </div>
    <button class="nav__hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-drawer">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="nav__drawer" id="nav-drawer" role="dialog" aria-label="Mobile navigation">
  <a href="index.html"    class="nav__link" id="drawer-home">Home</a>
  <a href="articles.html" class="nav__link" id="drawer-articles">Articles</a>
  <a href="reviews.html"  class="nav__link" id="drawer-reviews">Reviews</a>
  <a href="about.html"    class="nav__link" id="drawer-about">About</a>
</div>

<main class="page-top">
  <div class="container">
    <div id="review-reader" role="article">
      <!-- Content injected by JS -->
      <div class="reader" style="text-align:center;padding-top:var(--space-20)">
        <div class="spinner" style="margin-inline:auto;margin-bottom:var(--space-4)"></div>
        <p class="text-secondary">Loading review…</p>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer__bottom">
      <p class="footer__copy">© 2025 SafeSpace. Educational content only.</p>
      <p class="footer__motto">Made with <span>🛡️</span> and no cookies whatsoever</p>
    </div>
  </div>
</footer>

<script type="module">
  import { initNav }          from './js/nav.js';
  import { initTheme }        from './js/theme.js';
  import { initReviewReader } from './js/reader.js';

  initNav();
  initTheme();
  initReviewReader();

  window.addEventListener('hashchange', initReviewReader);
</script>
</body>
</html>
